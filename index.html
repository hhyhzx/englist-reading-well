<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#003366">
<link rel="manifest" href="manifest.json">
<title>精读笔记 · Day1-3</title>
<style>
:root{--bg:#faf9f6;--card:#fff;--text:#1a1a1a;--sub:#666;--accent:#003366;--red:#c62828;--blue:#1565c0;--green:#2e7d32;--orange:#e65100;--border:#e0dcd5;--tag-bg:#f5f0e8;--star:#f9a825;--link:#0d7a3e;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'SF Pro Text','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;line-height:1.5;-webkit-tap-highlight-color:transparent}

/* Header */
.header{background:var(--accent);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}
.header .stats{font-size:12px;opacity:.85}
.progress-bar{height:3px;background:rgba(255,255,255,.2)}
.progress-bar div{height:100%;background:#ffd54f;transition:width .3s}

/* Tabs */
.tabs{display:flex;position:sticky;top:48px;z-index:99;background:var(--bg);border-bottom:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{font-size:10px;background:var(--accent);color:#fff;border-radius:8px;padding:1px 6px;margin-left:4px}

/* Main content */
.main{padding:12px 14px 80px}
.card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card h3{font-size:15px;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card h4{font-size:13px;color:var(--accent);margin:8px 0 4px}

/* Check-in */
.check-row{display:flex;gap:10px;margin:6px 0;font-size:13px;align-items:center}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}
.check-row input[type=date]{font-size:13px;border:1px solid var(--border);border-radius:6px;padding:4px 8px;background:var(--bg)}
.score-stars{display:flex;gap:4px;margin:6px 0}
.score-stars span{font-size:22px;cursor:pointer;filter:grayscale(1);transition:filter .15s}
.score-stars span.on{filter:grayscale(0)}

/* Review table */
.review-table{width:100%;font-size:11px;border-collapse:collapse;margin:6px 0}
.review-table th{background:#f0ede5;padding:5px 6px;text-align:left;font-weight:600}
.review-table td{padding:4px 6px;border-bottom:1px solid var(--border)}
.review-table input[type=checkbox]{width:15px;height:15px;accent-color:var(--green)}

/* Sentence card */
.sent-card{border-left:3px solid var(--accent);padding:8px 10px;margin:6px 0;background:#faf8f4;border-radius:0 8px 8px 0;font-size:13px}
.sent-card .en{font-weight:500;margin-bottom:2px}
.sent-card .ph{font-size:11px;color:var(--link)}
.sent-card .cn{font-size:11px;color:var(--sub);margin-top:2px}
.sent-card .num{font-size:10px;color:var(--red);font-weight:700}

/* Vocab item */
.vocab-item{display:flex;align-items:baseline;flex-wrap:wrap;gap:4px 6px;padding:4px 0;border-bottom:1px dotted var(--border);font-size:12px}
.vocab-item .w{font-weight:700;font-size:13px}
.vocab-item .ipa{color:var(--link);font-size:11px}
.vocab-item .pos{color:var(--sub);font-size:10px}
.vocab-item .cn{color:var(--text)}
.tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;color:#fff;white-space:nowrap}
.tag-core{background:var(--red)}
.tag-adv{background:var(--blue)}
.tag-rec{background:var(--green)}
.tag-phr{background:var(--orange)}

/* Complex sentence tree */
.tree-card{background:#faf8f4;border-radius:8px;padding:10px;margin:6px 0;font-size:12px}
.tree-card .sent{font-weight:500;margin-bottom:6px;color:var(--accent)}
.tree-card .tree{font-family:'SF Mono','Consolas',monospace;font-size:11px;color:var(--sub);line-height:1.6}
.tree-card .tip{font-size:11px;color:var(--orange);margin-top:6px;padding-top:6px;border-top:1px dashed var(--border)}

/* Collapse */
.collapse-header{cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center}
.collapse-header::after{content:'▾';font-size:12px;transition:transform .2s;color:var(--sub)}
.collapse-header.open::after{transform:rotate(180deg)}
.collapse-body{display:none}
.collapse-body.show{display:block}

/* Self-test */
.test-input{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;width:100%;margin:3px 0;background:var(--bg)}
.test-input:focus{outline:none;border-color:var(--accent)}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:6px 0 env(safe-area-inset-bottom,6px);z-index:99}
.nav-item{flex:1;text-align:center;font-size:10px;color:var(--sub);cursor:pointer}
.nav-item .icon{font-size:20px;display:block}
.nav-item.active{color:var(--accent)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* Filter pills */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.filter-pill{font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid var(--border);cursor:pointer;background:var(--bg);transition:all .15s}
.filter-pill.on{color:#fff}
.filter-pill.on.core{background:var(--red);border-color:var(--red)}
.filter-pill.on.adv{background:var(--blue);border-color:var(--blue)}
.filter-pill.on.rec{background:var(--green);border-color:var(--green)}
.filter-pill.on.phr{background:var(--orange);border-color:var(--orange)}

/* Reading mode */
.reading-mode .sent-card .ph{display:block}
.hide-ph .sent-card .ph{display:none}

/* Responsive */
@media (max-width:360px){.header h1{font-size:16px}.tab{font-size:12px}.card{padding:10px}}
</style>
</head>

// ===================== STATE =====================
let currentDay = 0;
let currentView = 'home'; // home | review | stats
const STORAGE_KEY = 'jingdu_data_v2';

function defaultState(){
  const s = {};
  for(let d=0;d<3;d++){
    s['d'+d] = {
      morning:false, evening:false, date:'', score:0,
      tasks:[false,false,false,false,false,false],
      review:[false,false,false,false,false,false],
      prevReview: DAYS[d].prev.map(()=>false)
    };
  }
  return s;
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ const s = JSON.parse(raw); if(s.d0!==undefined) return s; }
  }catch(e){}
  return defaultState();
}

function saveState(s){ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let state = loadState();

// ===================== RENDER =====================
function render(){
  updateProgress();
  if(currentView==='home') renderDay(currentDay);
  else if(currentView==='review') renderReview();
  else if(currentView==='stats') renderStats();
}

function updateProgress(){
  let total=0, done=0;
  for(let d=0;d<3;d++){
    const ds = state['d'+d];
    total += 6 + DAYS[d].prev.length + 6; // tasks + prev + review
    done += ds.tasks.filter(t=>t).length + ds.prevReview.filter(t=>t).length + ds.review.filter(t=>t).length;
    if(ds.morning) done++;
    if(ds.evening) done++;
    if(ds.score>0) done++;
  }
  const pct = Math.round(done/total*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('headerStats').textContent = 'Day 1-3 · 完成 '+pct+'%';
}

  // Ebbinghaus review

  html += '<h4>🔴 核心词汇（'+day.core.length+'个）— 中考必须掌握的课标词</h4>';

  html += '<div class="vocab-group" data-type="rec">';

  day.phrases.forEach(v=>{ html += phraseItem(v); });
  html += '</div>';
  html += '</div>';

  // Complex sentences
  html += '<div class="card"><h3>🧩 复杂句子拆解（'+day.complex.length+'句）</h3>';
  day.complex.forEach(c=>{
    html += '<div class="tree-card"><div class="collapse-header" onclick="toggleCollapse(this)"><strong>'+c.title+'</strong></div>';
    html += '<div class="collapse-body"><div class="sent">'+c.sent+'</div>';
    html += '<div class="tree">'+c.tree.replace(/\n/g,'<br>')+'</div>';
    html += '<div class="tip">'+c.tip+'</div></div></div>';
  });

  html += '<div class="card"><h3>✍ 今日自测</h3>';

  });

  html += '</div>';

  document.getElementById('main').innerHTML = html;

function vocabItem(v,type){
  const tagClass = type==='core'?'tag-core':type==='adv'?'tag-adv':'tag-rec';
  const tagText = type==='core'?'核心':type==='adv'?'提高':'识记';
  return '<div class="vocab-item"><span class="w">'+v[0]+'</span><span class="ipa">'+v[1]+'</span><span class="pos">'+v[2]+'</span><span class="cn">'+v[3]+'</span><span class="tag '+tagClass+'">'+tagText+'</span></div>';
}

function phraseItem(v){
  return '<div class="vocab-item"><span class="w">'+v[0]+'</span><span class="cn">'+v[1]+'</span><span class="tag tag-phr">核心短语</span></div>';
}

  for(let d=0;d<3;d++){
    const day = DAYS[d];
    const ds = state['d'+d];
    html += '<div class="card"><h3>Day '+(d+1)+' · '+day.title+'</h3>';
    html += '<table class="review-table"><tr><th>复习轮次</th><th>状态</th></tr>';
    const names = ['当天学习','+1天快速过','+2天遮中文自测','+4天朗读+拆句','+7天全量自测','+15天巩固'];
    names.forEach((n,i)=>{
      html += '<tr><td>'+n+'</td><td>'+(ds.review[i]?'✅ 已完成':'⬜ 待复习')+'</td></tr>';
    });
    html += '</table></div>';
  }
  document.getElementById('main').innerHTML = html;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  document.getElementById('navReview').classList.add('active');
}

    const reviewDone = ds.review.filter(t=>t).length;
    html += '<div style="margin:8px 0"><strong>Day '+(d+1)+' · '+day.title+'</strong><br>';
    html += '<small>打卡：'+(ds.morning?'☀已签':'⬜')+' '+(ds.evening?'🌙已签':'⬜')+' | 得分：'+ds.score+'/10<br>';
    html += '任务：'+tasksDone+'/6 | 复习：'+reviewDone+'/6</small></div>';
  }
  const total = document.getElementById('progressFill').style.width;
  html += '<div style="margin-top:8px;font-weight:700">📈 总体完成度：'+total+'</div>';
  html += '</div>';
  document.getElementById('main').innerHTML = html;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('navStats').classList.add('active');
}

// ===================== ACTIONS =====================
function switchDay(d){
  currentDay = d;
  currentView = 'home';
  render();
}

function showReview(){ currentView='review'; render(); }
function showStats(){ currentView='stats'; render(); }

function save(){ saveState(state); updateProgress(); }

function setDate(d,v){ state['d'+d].date=v; save(); }
function setScore(d,v){ state['d'+d].score=v; save(); render(); }
function toggleCheck(d,key){ state['d'+d][key]=!state['d'+d][key]; save(); }
function toggleTask(d,i){ state['d'+d].tasks[i]=!state['d'+d].tasks[i]; save(); toast('✅ 任务'+(i+1)+'已'+(state['d'+d].tasks[i]?'完成':'取消')); }
function toggleReview(d,i){ state['d'+d].review[i]=!state['d'+d].review[i]; save(); }
function togglePrevReview(d,i){ state['d'+d].prevReview[i]=!state['d'+d].prevReview[i]; save(); }

function toggleCollapse(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('show');
}

function filterVocab(el,type){
  el.classList.toggle('on');
  const groups = document.querySelectorAll('.vocab-group[data-type="'+type+'"]');
  groups.forEach(g=> g.style.display = el.classList.contains('on')?'block':'none');
}

function checkTest(d){
  const words = DAYS[d].core.slice(0,8);
  let correct=0, html='';
  words.forEach((v,i)=>{
    const input = document.getElementById('test_'+d+'_'+i);
    if(!input) return;
    const ans = input.value.trim().toLowerCase();
    const expected = v[0].toLowerCase();
    if(ans === expected){
      correct++;
      html += '<div style="color:#2e7d32">✅ '+(i+1)+'. '+v[3]+' → '+v[0]+'</div>';
    } else {
      html += '<div style="color:#c62828">❌ '+(i+1)+'. '+v[3]+' → 正确答案：<b>'+v[0]+'</b> '+(ans?'(你写的：'+ans+')':'')+'</div>';
    }
  });
  html += '<div style="margin-top:4px;font-weight:700">得分：'+correct+'/'+words.length+'</div>';
  document.getElementById('testResult_'+d).innerHTML = html;
  if(correct===words.length) toast('🎉 全部正确！太棒了！');
}

function resetData(){
  if(confirm('确定要重置所有打卡数据吗？此操作不可恢复！')){
    state = defaultState();
    saveState(state);
    render();
    toast('🔄 数据已重置');
  }
}

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1500);
}

// ===================== INIT =====================
// Register service worker for PWA installability
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

render();

// Show install prompt on first visit
window.addEventListener('beforeinstallprompt', function(e){
  setTimeout(function(){
    if(confirm('📱 将此学习APP安装到手机桌面？\n\n安装后可在桌面直接打开，无需浏览器。')){
      e.prompt();
    }
  }, 3000);
});
</script>
