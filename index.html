<style>
:root{--bg:#faf9f6;--card:#fff;--text:#1a1a1a;--sub:#888;--accent:#003366;--red:#c62828;--blue:#1565c0;--green:#2e7d32;--orange:#e65100;--border:#e0dcd5;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;line-height:1.5}
.header{background:var(--accent);color:#fff;padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:17px}
.header span{font-size:11px;opacity:.8}
.tabs{display:flex;position:sticky;top:40px;z-index:99;background:var(--bg);border-bottom:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:9px 0;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:10px 12px 30px}

.mode-tabs{display:flex;gap:6px;margin:6px 0}
.mode-tab{flex:1;text-align:center;padding:6px;border-radius:8px;background:var(--bg);font-size:12px;cursor:pointer;border:1px solid var(--border)}
.mode-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.card{background:var(--card);border-radius:10px;padding:16px;margin:8px 0;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}
.card .en{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:6px}
.card .ipa{font-size:15px;color:var(--green);margin-bottom:8px}
.card .pos{font-size:12px;color:var(--sub)}
.card .cn{font-size:20px;font-weight:600;color:var(--text);margin-top:8px}
.card .divider{border:none;border-top:1px dashed var(--border);margin:10px 0}
.card .tag-row{margin-top:6px}

.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff}
.tag-core{background:var(--red)}
.tag-adv{background:var(--blue)}
.tag-rec{background:var(--green)}
.tag-phr{background:var(--orange)}

.pattern-card{background:var(--card);border-radius:10px;padding:16px;margin:8px 0;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}
.pattern-card .pname{font-size:18px;font-weight:700;color:var(--red);font-family:monospace;margin-bottom:8px}
.pattern-card .eg{font-size:14px;color:var(--accent);margin:6px 0}
.pattern-card .pcn{font-size:13px;color:var(--sub)}

.page-info{text-align:center;font-size:12px;color:var(--sub);margin:8px 0}

.nav-row{display:flex;gap:8px;margin:8px 0}
.nav-row button{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-size:14px;cursor:pointer}
.nav-row button:active{background:var(--bg)}
</style>
</head>

let currentDay = 0;
let currentMode = 'vocab';
let currentIdx = 0;

function getCategory(idx){
      const day = DAYS[currentDay];
      if(idx < day.core.length) return {name:'🔴 核心词汇', cls:'tag-core', tag:'核心'};
      idx -= day.core.length;
      if(idx < day.advanced.length) return {name:'🔵 提高词汇', cls:'tag-adv', tag:'提高'};
      return {name:'🟢 识记词汇', cls:'tag-rec', tag:'识记'};
    }

function render(){
      const day = DAYS[currentDay];
      const modeLabel = currentMode==='vocab'?'词汇':(currentMode==='phrase'?'短语':'句型');
      document.getElementById('headerInfo').textContent =
        'Day '+(currentDay+1)+' · '+modeLabel;

      let html = '<div class="mode-tabs">';
      html += '<div class="mode-tab'+(currentMode==='vocab'?' active':'')+'" onclick="switchMode(\'vocab\')">📝 词汇</div>';
      html += '<div class="mode-tab'+(currentMode==='phrase'?' active':'')+'" onclick="switchMode(\'phrase\')">🔗 短语 ('+day.phrases.length+')</div>';
      html += '<div class="mode-tab'+(currentMode==='pattern'?' active':'')+'" onclick="switchMode(\'pattern\')">🧩 句型 ('+day.patterns.length+')</div>';
      html += '</div>';

      const items = getItems();
      if(items.length === 0){ document.getElementById('main').innerHTML = html; return; }
      if(currentIdx >= items.length) currentIdx = 0;
      if(currentIdx < 0) currentIdx = items.length - 1;

      if(currentMode === 'vocab'){
        const cat = getCategory(currentIdx);
        const v = items[currentIdx];
        html += '<div style="font-size:12px;color:var(--sub);text-align:center;margin-bottom:2px">'+cat.name+'</div>';
        html += '<div class="card" id="card" onclick="flipCard()">';
        html += '<div class="en">'+v[0]+'</div>';
        html += '<div class="ipa">'+v[1]+'</div>';
        html += '<hr class="divider">';
        html += '<div class="cn" id="cardBack" style="display:none">'+v[3]+'</div>';
        html += '<div class="pos" id="cardPos" style="display:none">'+v[2]+'</div>';
        html += '<div class="tag-row"><span class="tag '+cat.cls+'">'+cat.tag+'</span></div>';
        html += '<div style="font-size:10px;color:var(--sub);margin-top:6px">👆 点击卡片查看释义</div>';
        html += '</div>';
        html += '<div class="page-info">'+(currentIdx+1)+' / '+items.length+'</div>';
      } else if(currentMode === 'phrase'){
        const v = items[currentIdx];
        html += '<div class="card" id="card" onclick="flipCard()">';
        html += '<div class="en" style="font-size:18px">'+v[0]+'</div>';
        html += '<hr class="divider">';
        html += '<div class="cn" id="cardBack" style="display:none">'+v[1]+'</div>';
        html += '<div class="tag-row"><span class="tag tag-phr">核心短语</span></div>';
        html += '<div style="font-size:10px;color:var(--sub);margin-top:6px">👆 点击卡片查看释义</div>';
        html += '</div>';
        html += '<div class="page-info">'+(currentIdx+1)+' / '+items.length+'</div>';
      } else {
        const v = items[currentIdx];
        html += '<div class="pattern-card">';
        html += '<div class="pname">'+v[0]+'</div>';
        html += '<div class="eg">'+v[1]+'</div>';
        html += '<div class="pcn">'+v[2]+'</div>';
        html += '</div>';
        html += '<div class="page-info">'+(currentIdx+1)+' / '+items.length+'</div>';
      }

      html += '<div class="nav-row">';
      html += '<button onclick="prevItem()">◀</button>';
      html += '<button onclick="flipCard()" style="font-size:18px">👆 翻转</button>';
      html += '<button onclick="nextItem()">▶</button>';
      html += '</div>';

      document.getElementById('main').innerHTML = html;
      document.querySelectorAll('.tab').forEach((t,i)=> t.classList.toggle('active', i===currentDay));
      window._flipped = false;
    }

function flipCard(){
      window._flipped = !window._flipped;
      const back = document.getElementById('cardBack');
      const pos = document.getElementById('cardPos');
      if(back) back.style.display = window._flipped ? 'block' : 'none';
      if(pos) pos.style.display = window._flipped ? 'block' : 'none';
    }

function getItems(){
  const day = DAYS[currentDay];
  if(currentMode==='vocab') return day.core.concat(day.advanced).concat(day.recognition);
  if(currentMode==='phrase') return day.phrases;
  return day.patterns;
}

function switchDay(d){ currentDay=d; currentIdx=0; render(); }
function switchMode(m){ currentMode=m; currentIdx=0; render(); }
function nextItem(){ currentIdx++; if(currentIdx>=getItems().length) currentIdx=0; render(); }
function prevItem(){ currentIdx--; if(currentIdx<0) currentIdx=getItems().length-1; render(); }

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') prevItem();
  if(e.key==='ArrowRight') nextItem();
});

// Swipe
let tx=0;
document.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; });
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){ if(dx<0) nextItem(); else prevItem(); }
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

render();
</script>
</body>
</html>
