// ==================== SPEECH ====================
function speak(text){
  if(!window.speechSynthesis){
    alert('浏览器不支持语音');
    return;
  }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  u.pitch = 1;
  // Animate all speaker icons
  document.querySelectorAll('.speaker').forEach(s=>s.classList.add('speaking'));
  u.onend = ()=>{ document.querySelectorAll('.speaker').forEach(s=>s.classList.remove('speaking')); };
  window.speechSynthesis.speak(u);
      markListened();
}

    ['make + 宾 + 宾补 (what 名词性从句作宾语)','These difficult conditions make what Italian pilot Dario Costa\'s achievement exactly so impressive.','├─ 主语: These difficult conditions\n├─ 谓语: make\n├─ 宾语: what Italian pilot Dario Costa\'s achievement (what 引导的名词性从句)\n└─ 宾补: so impressive','⚠️ make + n. + adj. 使……处于某种状态。what 从句 = 名词 (= the thing that)'],
    ['not only … but also … + 动名词主语','Pulling off such a dangerous manoeuvre required not only courage and quick reactions, but also years of planning and training.','├─ 主语: Pulling off such a dangerous manoeuvre (动名词短语作主语)\n├─ 谓语: required (用单数！动名词主语 = 单数)\n└─ 宾语: not only courage and quick reactions, but also years of planning and training','⚠️ 动名词主语→谓语单数。not only A but also B（就近原则）'],
    ['直接引语 + 不定式目的状语 + Therefore','"To become the first pilot to land on a moving train, Dario had to achieve a blind landing. Therefore, he depended entirely on his training and instincts to touch down safely."','├─ 目的状语: To become the first pilot (不定式)\n├─ 主句: Dario had to achieve a blind landing\n├─ 因果连接: Therefore\n└─ 主句: he depended entirely on his training and instincts','⚠️ To become... 不定式作目的状语。Therefore 因果连接词。touch down = 着陆'],
    ['As if 虚拟语气 + deal with','As if the moving train and short runway weren\'t enough, Dario also had to deal with strong airflow and changing air speeds.','├─ 引导词: As if (好像/似乎)\n├─ 方式状语从句: the moving train and short runway weren\'t enough (虚拟语气)\n└─ 主句: Dario also had to deal with strong airflow and changing air speeds','⚠️ As if + 从句 = 好像/似乎（常用虚拟语气）。deal with = 应对/处理'],


,
  ]
}];

// ==================== STATE ====================
let currentDay = 0;
const LKEY = 'listen_v1';
let listened = {};
try{ listened = JSON.parse(localStorage.getItem(LKEY)) || {}; }catch(e){}
function saveListened(){ localStorage.setItem(LKEY, JSON.stringify(listened)); }
function lid(){ return currentDay+'_'+currentMode+'_'+currentIdx; }
function markListened(){ listened[lid()]=1; saveListened(); updateHeader(); }
function isListened(){ return listened[lid()]||0; }
function listenedCount(){
  let c=0;
  const day=DAYS[currentDay];
  const all=[...day.core,...day.advanced,...day.recognition,...day.phrases];
  if(day.complex) all.push(...day.complex);
  for(let k in listened){
    const parts=k.split('_');
    if(parseInt(parts[0])===currentDay && listened[k]) c++;
  }
  return c;
}
function totalCount(){
  const d=DAYS[currentDay];
  return d.core.length+d.advanced.length+d.recognition.length+d.phrases.length+(d.complex?d.complex.length:0);
}
function updateHeader(){
      updateHeader();
}
let currentMode = 'vocab';
let currentIdx = 0;

function getCategory(idx){
  const day = DAYS[currentDay];
  if(idx < day.core.length) return {name:'🔴 核心词汇', cls:'tag-core', tag:'核心'};
  idx -= day.core.length;
  if(idx < day.advanced.length) return {name:'🔵 提高词汇', cls:'tag-adv', tag:'提高'};
  return {name:'🟢 识记词汇', cls:'tag-rec', tag:'识记'};
}

function render(){
  const day = DAYS[currentDay];
  const modeLabel = currentMode==='vocab'?'词汇':(currentMode==='phrase'?'短语':'句子');
  document.getElementById('headerInfo').textContent = 'Day '+(currentDay+1)+' · '+modeLabel;

  let html = '<div class="mode-tabs">';
  html += '<div class="mode-tab'+(currentMode==='vocab'?' active':'')+'" onclick="switchMode(\'vocab\')">📝 词汇</div>';
  html += '<div class="mode-tab'+(currentMode==='phrase'?' active':'')+'" onclick="switchMode(\'phrase\')">🔗 短语 ('+day.phrases.length+')</div>';
  html += '<div class="mode-tab'+(currentMode==='pattern'?' active':'')+'" onclick="switchMode(\'pattern\')">🧩 句型 ('+day.patterns.length+')</div>';
  html += '</div>';

  const items = getItems();
  if(items.length === 0){ document.getElementById('main').innerHTML = html; return; }
  if(currentIdx >= items.length) currentIdx = 0;
  if(currentIdx < 0) currentIdx = items.length - 1;

  if(currentMode === 'vocab'){
    const cat = getCategory(currentIdx);
    const v = items[currentIdx];
    html += '<div class="cat-label">'+cat.name+'</div>';
    html += '<div class="card" id="card" onclick="flipCard()">';
    html += '<div class="en">'+v[0]+'</div>';
    html += '<div class="ipa">'+v[1]+'</div>';
    html += '<div class="speaker" onclick="event.stopPropagation();speak(\''+v[0].replace(/'/g,"\\'")+'\')">🔊</div>'+(isListened()?' ✅':'')+'';
    html += '<hr class="divider">';
    html += '<div class="cn" id="cardBack" style="display:none">'+v[3]+'</div>';
    html += '<div class="pos" id="cardPos" style="display:none">'+v[2]+'</div>';
    html += '<div class="tag-row"><span class="tag '+cat.cls+'">'+cat.tag+'</span></div>';
    html += '<div class="hint">👆 点击卡片查看释义 ｜ 🔊 点喇叭听读音</div>';
    html += '</div>';
  } else if(currentMode === 'phrase'){
    const v = items[currentIdx];
    html += '<div class="card" id="card" onclick="flipCard()">';
    html += '<div class="en">'+v[0]+'</div>';
    html += '<div class="speaker" onclick="event.stopPropagation();speak(\''+v[0].replace(/'/g,"\\'")+'\')">🔊</div>'+(isListened()?' ✅':'')+'';
    html += '<hr class="divider">';
    html += '<div class="cn" id="cardBack" style="display:none">'+v[1]+'</div>';
    html += '<div class="tag-row"><span class="tag tag-phr">核心短语</span></div>';
    html += '<div class="hint">👆 点击卡片查看释义 ｜ 🔊 点喇叭听读音</div>';
    html += '</div>';
  } else {
    // Pattern: [formula, example, meaning, note]
    const v = items[currentIdx];
    html += '<div class="pattern-card">';
    html += '<div class="pname">'+v[0]+'</div>';
    html += '<div class="eg">'+v[1].replace(/<kw>/g,'<span class="kw">').replace(/<\/kw>/g,'</span>')+'</div>';
    html += '<div class="pcn">💡 '+v[2]+'</div>';
    html += '<div class="note">'+v[3]+'</div>';
    // Speaker for the example sentence (strip tags)
    const cleanEg = v[1].replace(/<[^>]*>/g,'').replace(/"/g,'');
    html += '<div class="speaker" onclick="speak(\''+cleanEg.replace(/'/g,"\\'")+'\')">🔊 朗读例句</div>'+(isListened()?' ✅':'')+'';
    html += '</div>';
  }

  html += '<div class="page-info">'+(currentIdx+1)+' / '+items.length+'</div>';

  html += '<div class="nav-row">';
  html += '<button onclick="prevItem()">◀</button>';
  html += '<button onclick="flipCard()">👆 翻转</button>';
  html += '<button onclick="nextItem()">▶</button>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
  document.querySelectorAll('.tab').forEach((t,i)=> t.classList.toggle('active', i===currentDay));
  window._flipped = false;
}

function flipCard(){
  window._flipped = !window._flipped;
  const back = document.getElementById('cardBack');
  const pos = document.getElementById('cardPos');
  if(back) back.style.display = window._flipped ? 'block' : 'none';
  if(pos) pos.style.display = window._flipped ? 'block' : 'none';
}

function getItems(){
  const day = DAYS[currentDay];
  if(currentMode==='vocab') return day.core.concat(day.advanced).concat(day.recognition);
  if(currentMode==='phrase') return day.phrases;
  return day.patterns;
}

function switchDay(d){ currentDay=d; currentIdx=0; render(); }
function switchMode(m){ currentMode=m; currentIdx=0; render(); }
function nextItem(){ currentIdx++; if(currentIdx>=getItems().length) currentIdx=0; render(); }
function prevItem(){ currentIdx--; if(currentIdx<0) currentIdx=getItems().length-1; render(); }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') prevItem();
  if(e.key==='ArrowRight') nextItem();
  if(e.key===' '||e.key==='Space'){ e.preventDefault(); flipCard(); }
});

let tx=0;
document.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; });
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){ if(dx<0) nextItem(); else prevItem(); }
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js?v=5').catch(()=>{});
}

render();
</script>
</body>
</html>
