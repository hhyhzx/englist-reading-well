<style>
:root{--bg:#faf9f6;--card:#fff;--text:#1a1a1a;--sub:#888;--accent:#003366;--red:#c62828;--blue:#1565c0;--green:#2e7d32;--orange:#e65100;--border:#e0dcd5;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;line-height:1.5;-webkit-tap-highlight-color:transparent;user-select:none}

.header{background:var(--accent);color:#fff;padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:17px}
.header span{font-size:11px;opacity:.8}

.tabs{display:flex;position:sticky;top:40px;z-index:99;background:var(--bg);border-bottom:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:9px 0;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.main{padding:10px 12px 70px}
.section-title{font-size:14px;font-weight:700;color:var(--accent);margin:12px 0 6px;padding:6px 10px;background:var(--card);border-radius:8px;box-shadow:var(--shadow)}
.section-title .count{font-size:11px;color:var(--sub);font-weight:400}

/* Flashcard */
.flashcard{background:var(--card);border-radius:10px;padding:14px;margin:8px 0;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.flashcard:active{transform:scale(.98)}
.flashcard .front{text-align:center}
.flashcard .front .en{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px}
.flashcard .front .ipa{font-size:14px;color:var(--green);margin-bottom:2px}
.flashcard .back{display:none;text-align:center;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
.flashcard .back .cn{font-size:18px;font-weight:600;color:var(--text)}
.flashcard .back .pos{font-size:12px;color:var(--sub);margin-top:2px}
.flashcard .back .note{font-size:11px;color:var(--orange);margin-top:4px}
.flashcard.show .back{display:block}

.tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;color:#fff;margin-left:4px;vertical-align:middle}
.tag-core{background:var(--red)}
.tag-adv{background:var(--blue)}
.tag-rec{background:var(--green)}
.tag-phr{background:var(--orange)}

/* Progress */
.progress{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.dot.seen{background:var(--accent)}
.dot.mastered{background:var(--green)}

/* Bottom */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:6px 10px env(safe-area-inset-bottom,6px);gap:8px;z-index:99}
.bottom-bar button{flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-flip{background:var(--accent);color:#fff}
.btn-known{background:#e8f5e9;color:var(--green)}
.btn-unknown{background:#fce4ec;color:var(--red)}
.btn-reset{background:var(--bg);color:var(--sub);flex:.5;font-size:11px}

/* Stats bar */
.stats-bar{display:flex;gap:8px;margin:8px 0;font-size:11px;color:var(--sub)}
.stats-bar span{background:var(--card);padding:3px 8px;border-radius:10px;box-shadow:var(--shadow)}

/* Highlight animation */
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.pop{animation:pop .3s ease}

/* Filter */
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0}
.filter-pill{font-size:10px;padding:3px 10px;border-radius:12px;border:1px solid var(--border);cursor:pointer;background:var(--bg)}
.filter-pill.on.core{background:var(--red);color:#fff;border-color:var(--red)}
.filter-pill.on.adv{background:var(--blue);color:#fff;border-color:var(--blue)}
.filter-pill.on.rec{background:var(--green);color:#fff;border-color:var(--green)}
.filter-pill.on.phr{background:var(--orange);color:#fff;border-color:var(--orange)}

/* Mode tabs */
.mode-tabs{display:flex;gap:6px;margin:6px 0}
.mode-tab{flex:1;text-align:center;padding:6px;border-radius:8px;background:var(--bg);font-size:12px;cursor:pointer;border:1px solid var(--border)}
.mode-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Sentence pattern card */
.pattern-card{background:var(--card);border-radius:8px;padding:12px;margin:8px 0;box-shadow:var(--shadow)}
.pattern-card .pattern{font-size:16px;color:var(--red);font-weight:600;margin-bottom:4px;font-family:monospace}
.pattern-card .eg{font-size:13px;color:var(--accent);margin:4px 0}
.pattern-card .cn{font-size:12px;color:var(--sub)}
</style>
</head>

// ==================== STATE ====================
const KEY = 'vocab_mem_v1';
let currentDay = 0;
let currentIdx = 0;
let currentMode = 'vocab'; // vocab | phrase | pattern
let state = loadState();

function defaultState(){
  const s = {};
  for(let d=0;d<3;d++){
    s['d'+d] = {};
    // Track each vocab item: 0=unseen, 1=seen, 2=mastered
    ['core','advanced','recognition'].forEach(cat=>{
      DAYS[d][cat].forEach((_,i)=>{ s['d'+d][cat+'_'+i] = 0; });
    });
    DAYS[d].phrases.forEach((_,i)=>{ s['d'+d]['phrase_'+i] = 0; });
    DAYS[d].patterns.forEach((_,i)=>{ s['d'+d]['pattern_'+i] = 0; });
  }
  return s;
}

function loadState(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return defaultState();
}

function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

// ==================== RENDER ====================

  let total=0, seen=0, mastered=0;

    day[cat].forEach((_,i)=>{
      total++;
      if(ds[cat+'_'+i] >= 1) seen++;
      if(ds[cat+'_'+i] >= 2) mastered++;
    });
  });
  document.getElementById('statsText').textContent =
    'Day '+(currentDay+1)+' · 已看 '+seen+' · 已掌握 '+mastered+' · 共 '+total+'词';

  // Mode tabs
  let html = '<div class="mode-tabs">';
  html += '<div class="mode-tab'+(currentMode==='vocab'?' active':'')+'" onclick="switchMode(\'vocab\')">📝 词汇 ('+total+')</div>';
  html += '<div class="mode-tab'+(currentMode==='phrase'?' active':'')+'" onclick="switchMode(\'phrase\')">🔗 短语 ('+day.phrases.length+')</div>';
  html += '<div class="mode-tab'+(currentMode==='pattern'?' active':'')+'" onclick="switchMode(\'pattern\')">🧩 句型 ('+day.patterns.length+')</div>';
  html += '</div>';

  // Progress dots
  html += '<div class="progress">';
  const itemCount = getItemCount();
  for(let i=0;i<itemCount;i++){
    const s = getItemState(i);
    html += '<div class="dot'+(s>=2?' mastered':(s>=1?' seen':''))+'" onclick="goTo('+i+')"></div>';
    if((i+1)%15===0) html += '<br>';
  }
  html += '</div>';

  // Stats bar
  html += '<div class="stats-bar">';
  html += '<span>🟢 掌握: '+countByState(2)+'</span>';
  html += '<span>🔵 见过: '+countByState(1)+'</span>';
  html += '<span>⬜ 新词: '+countByState(0)+'</span>';
  html += '</div>';

  // Current card
  if(itemCount > 0){
    currentIdx = Math.min(currentIdx, itemCount-1);
    html += renderCard(currentIdx);
  }

  document.getElementById('main').innerHTML = html;

  // Update tabs
  document.querySelectorAll('.tab').forEach((t,i)=> t.classList.toggle('active', i===currentDay));
}

function getItemCount(){
  const day = DAYS[currentDay];
  if(currentMode === 'vocab') return day.core.length + day.advanced.length + day.recognition.length;
  if(currentMode === 'phrase') return day.phrases.length;
  return day.patterns.length;
}

function getItemState(idx){
  const day = DAYS[currentDay];
  const ds = state['d'+currentDay];
  if(currentMode === 'vocab'){
    if(idx < day.core.length) return ds['core_'+idx]||0;
    idx -= day.core.length;
    if(idx < day.advanced.length) return ds['advanced_'+idx]||0;
    idx -= day.advanced.length;
    return ds['recognition_'+idx]||0;
  }
  if(currentMode === 'phrase') return ds['phrase_'+idx]||0;
  return ds['pattern_'+idx]||0;
}

function setItemState(idx, val){
  const day = DAYS[currentDay];
  const ds = state['d'+currentDay];
  if(currentMode === 'vocab'){
    if(idx < day.core.length){ ds['core_'+idx]=val; return; }
    idx -= day.core.length;
    if(idx < day.advanced.length){ ds['advanced_'+idx]=val; return; }
    idx -= day.advanced.length;
    ds['recognition_'+idx]=val;
    return;
  }
  if(currentMode === 'phrase'){ ds['phrase_'+idx]=val; return; }
  ds['pattern_'+idx]=val;
}

function countByState(val){
  let count=0;
  for(let i=0;i<getItemCount();i++){
    if(getItemState(i)===val) count++;
  }
  return count;
}

function getItemData(idx){
  const day = DAYS[currentDay];
  if(currentMode === 'vocab'){
    if(idx < day.core.length) return {data:day.core[idx], type:'core'};
    idx -= day.core.length;
    if(idx < day.advanced.length) return {data:day.advanced[idx], type:'advanced'};
    idx -= day.advanced.length;
    return {data:day.recognition[idx], type:'recognition'};
  }
  if(currentMode === 'phrase') return {data:day.phrases[idx], type:'phrase'};
  return {data:day.patterns[idx], type:'pattern'};
}

function renderCard(idx){
  const {data, type} = getItemData(idx);
  const s = getItemState(idx);
  let html = '<div class="flashcard show" id="card">';

  if(type === 'pattern'){
    // Pattern: [name, example, meaning]
    html += '<div class="front"><div class="en" style="font-family:monospace;font-size:17px;color:#c62828">'+data[0]+'</div></div>';
    html += '<div class="back"><div class="eg">'+data[1]+'</div><div class="cn">'+data[2]+'</div></div>';
  } else if(type === 'phrase'){
    html += '<div class="front"><div class="en" style="font-size:17px">'+data[0]+'</div></div>';
    html += '<div class="back"><div class="cn">'+data[1]+'</div><span class="tag tag-phr">核心短语</span></div>';
  } else {
    // Vocab: [word, ipa, pos, meaning]
    const tagClass = type==='core'?'tag-core':type==='advanced'?'tag-adv':'tag-rec';
    const tagText = type==='core'?'核心':type==='advanced'?'提高':'识记';
    html += '<div class="front"><div class="en">'+data[0]+'</div><div class="ipa">'+data[1]+'</div></div>';
    html += '<div class="back"><div class="cn">'+data[3]+'</div><div class="pos">'+data[2]+'</div><span class="tag '+tagClass+'">'+tagText+'</span></div>';
  }

  // State indicator
  const stateText = s===2?'🟢 已掌握':(s===1?'🔵 见过':'⬜ 新词');
  html += '<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--sub)">'+stateText+' · '+(idx+1)+'/'+getItemCount()+'</div>';
  html += '</div>';
  return html;
}

// ==================== ACTIONS ====================
function switchDay(d){ currentDay=d; currentIdx=0; render(); }

function switchMode(m){
  currentMode=m; currentIdx=0;
  render();
}

function goTo(i){ currentIdx=i; render(); }

function markKnown(){
  const s = getItemState(currentIdx);
  setItemState(currentIdx, s>=2 ? 0 : 2); // toggle: mastered -> unseen
  save();
  nextCard();
}

function markUnknown(){
  const s = getItemState(currentIdx);
  setItemState(currentIdx, s>=1 ? 0 : 1); // toggle: seen -> unseen
  save();
  nextCard();
}

function nextCard(){
  currentIdx = (currentIdx + 1) % getItemCount();
  render();
  // Scroll card into view
  setTimeout(()=>{
    const card = document.getElementById('card');
    if(card) card.classList.add('pop');
  }, 50);
}

function resetDay(){
  if(confirm('重置 Day '+(currentDay+1)+' 的学习进度？')){
    const ds = state['d'+currentDay];
    Object.keys(ds).forEach(k=>{ ds[k]=0; });
    currentIdx=0;
    save();
    render();
  }
}

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e=>{ touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 60){
    if(dx < -30) markUnknown();
    else if(dx > 30) markKnown();
  }
});

// Keyboard support
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft') markUnknown();
  if(e.key==='ArrowRight') markKnown();
  if(e.key==='ArrowUp'||e.key==='ArrowDown'){ e.preventDefault(); nextCard(); }
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

render();
</script>
</body>
</html>
